{% extends "adminuser/_template.html" %}
{% load static %}
{% block title %}Products Export{% endblock %}
{% block content %}
<style> .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.875rem; } </style>

<form method="post" action="{% url 'product_export' %}?export_all=True" id="export_form" class="export_form">
    {% csrf_token %}
    <div class="row">
        <h2 class="page-title mt-4 mb-3">Export Products</h2>
    <div class="col-12">
    <div class="card">
    <div class="card-body">
        <div class="form-check mb-3">

            <div class="row">
            <div class="col-md-10">
            <label for="tag">Tags</label>
            <input type="text" name="tag" id="tag" class="form-control" placeholder="Tags">
            </div>
      
            </div>
        </div>
      <div class="col-md-6">
            <input type="checkbox" class="form-check-input" id="selectAll">
            <label class="form-check-label" for="selectAll">Select All</label>
            </div>
        <div class="row">
            {% for field in fields %}
             <div class="col-md-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" name="selected_fields" value="{{ field }}" id="check_{{ field }}">
                    <label class="form-check-label" for="check_{{ field }}">{{ field }}</label>
                </div>
             </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary mt-3">Submit</button>
    </div>
</div>
</div>
</div>
</form>
{% include 'adminuser/_pagination.html' %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script>
    document.getElementById('selectAll').addEventListener('change', function() {
        var checkboxes = document.querySelectorAll('input[name="selected_fields"]');
        for (var checkbox of checkboxes) {
            checkbox.checked = this.checked;
        }
    });
    document.getElementById('export_form').addEventListener('submit', function(event) {
        var checkedBoxes = document.querySelectorAll('input[name="selected_fields"]:checked');
        if (checkedBoxes.length === 0) {
            alert('Please select at least one field.');
            event.preventDefault();
        }
    });
</script>
{% endblock content %}
